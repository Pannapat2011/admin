<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0F172A; color: white; font-family: 'Prompt', sans-serif; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 20px; margin-bottom: 30px;}
        table { width: 100%; border-collapse: collapse; background: #1E293B; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        th, td { padding: 18px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #3B82F6; font-size: 1.1rem;}
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; color:white; font-weight:bold; transition: 0.2s;}
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin:0;"><i class="fa-solid fa-user-gear"></i> ระบบจัดการหลังบ้านสูงสุด (Super Admin)</h1>
            <p style="color:#94A3B8; margin-top:5px;">ดึงข้อมูลแบบ Real-time จาก Google Sheets</p>
        </div>
        <button class="btn" style="background: #10B981; font-size:1.1rem;" onclick="loadAllUsers()"><i class="fa-solid fa-rotate"></i> รีเฟรชข้อมูล</button>
    </div>
    
    <table id="user-table">
        <thead>
            <tr><th>รหัสเครื่อง (ID)</th><th>ชื่อผู้ใช้งาน</th><th>อายุ</th><th>โรคประจำตัว</th><th>เบอร์โทรศัพท์</th><th>จัดการ</th></tr>
        </thead>
        <tbody id="user-body">
            <tr><td colspan="6" style="text-align:center; padding: 30px; font-size:1.2rem;"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</td></tr>
        </tbody>
    </table>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzph3otQ0ERZxWxwb8t-GrJbDeuzz9K4zMUCl4DpacNNItpZXX5OgoRKKwqfymLLn6fAw/exec";
        
        async function loadAllUsers() {
            const body = document.getElementById('user-body');
            body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px; font-size:1.2rem;"><i class="fa-solid fa-spinner fa-spin"></i> กำลังดึงข้อมูล...</td></tr>';
            try {
                const res = await fetch(GAS_URL + "?action=readAll");
                const text = await res.text();
                
                try {
                    const data = JSON.parse(text);
                    body.innerHTML = "";
                    if(data.length <= 1) { body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#94A3B8;">ยังไม่มีผู้ใช้งานในระบบ</td></tr>'; return; }
                    
                    for (let i = 1; i < data.length; i++) {
                        if(!data[i][0]) continue;
                        body.innerHTML += `
                            <tr>
                                <td style="color:#38BDF8; font-weight:bold;">${data[i][0]}</td>
                                <td style="font-weight:bold;">${data[i][1] || ''} ${data[i][2] || ''}</td>
                                <td>${data[i][3] || '-'}</td>
                                <td>${data[i][5] || '-'}</td>
                                <td>${data[i][7] || '-'}</td>
                                <td><button class="btn" style="background:#EF4444;" onclick="deleteUser('${data[i][0]}')"><i class="fa-solid fa-trash"></i> ลบ</button></td>
                            </tr>`;
                    }
                } catch(e) {
                    body.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#F59E0B; padding:30px;">⚠️ ข้อมูลที่ส่งมาไม่ใช่ JSON โปรดตรวจสอบ Apps Script</td></tr>';
                }
            } catch(error) {
                body.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#EF4444; padding:30px;">❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้: ${error.message}</td></tr>`;
            }
        }

        function deleteUser(id) {
            if(confirm("ยืนยันการลบบัญชี " + id + " ออกจากระบบถาวร?")) {
                fetch(GAS_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "data=" + encodeURIComponent(JSON.stringify({action: "delete", system_id: id})) 
                }).then(() => {
                    alert("ลบข้อมูลสำเร็จ!");
                    loadAllUsers();
                });
            }
        }
        window.onload = loadAllUsers;
    </script>
</body>
</html>
